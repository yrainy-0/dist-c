name: '📺 BiliBili: ⚙️ Enhanced'
description: |-
  哔哩哔哩：增强模式
  中国站功能增强及UI自定义
compat_arguments:
  Home.Switch: 'true'
  Home.Tab: 直播tab,推荐tab,hottopic,bangumi
  Home.Tab_default: 推荐tab
  Home.Top_left: mine
  Home.Top: 消息Top
  Bottom: home,dynamic,我的Bottom
  Region.Switch: 'true'
  Mine.Switch: 'true'
  Mine.iPad.Switch: 'true'
  Storage: Argument
  LogLevel: WARN
compat_arguments_desc: |
  Home.Switch: [首页] 启用此标签页自定义功能
  启用后可自定义首页标签页、顶栏按钮等内容。

  Home.Tab: [首页] 标签页
      ├ 直播tab: 直播
      ├ 推荐tab: 推荐
      ├ hottopic: 热门
      ├ bangumi: 番剧
      ├ anime: 动画（港澳台）
      ├ film: 影视
      ├ koreavtw: 韩综（港澳台）
      ├ game: 游戏
      ├ mctab: minecraft
      ├ dhtr: 动画同人
      ├ gaoxiao: 搞笑
      ├ school: 校园
      └ kj: 数码
  请选择启用的首页标签页，建议不超过7个。

  Home.Tab_default: [首页] 默认标签页
      ├ 直播tab: 直播
      ├ 推荐tab: 推荐
      ├ hottopic: 热门
      ├ bangumi: 番剧
      ├ anime: 动画（港澳台）
      ├ film: 影视
      ├ koreavtw: 韩综（港澳台）
      ├ game: 游戏
      ├ mctab: minecraft
      ├ dhtr: 动画同人
      ├ gaoxiao: 搞笑
      ├ school: 校园
      └ kj: 数码
  请选择启动APP时默认展示的标签页，需选择已启用的标签页。

  Home.Top_left: [首页] 顶栏（左侧）按钮（用户头像）
      ├ mine: 用户中心-我的
      └ videoshortcut: 短视频
  请选择顶栏（左侧）按钮（用户头像）的作用（在biliBili粉色版中无法修改）。

  Home.Top: [首页] 顶栏（右侧）按钮
      ├ 游戏中心Top: 游戏中心
      ├ 会员购Top: 会员购
      └ 消息Top: 消息
  请选择启用的顶栏（右侧）按钮。

  Bottom: [底部] 导航栏按钮
      ├ home: 首页
      ├ 频道Bottom: 频道
      ├ dynamic: 动态
      ├ publish: 发布
      ├ ogv: 节目（港澳台）
      ├ 会员购Bottom: 会员购
      ├ 消息Bottom: 消息
      └ 我的Bottom: 我的
  请选择启用的底部导航栏按钮，最多6个。

  Region.Switch: [分区] 启用此标签页自定义功能
  启用后可自定义分区标签页的内容。

  Mine.Switch: [我的] 启用此标签页自定义功能
  启用后可自定义我的标签页的服务内容。

  Mine.iPad.Switch: [我的 iPad版] 启用此标签页自定义功能
  启用后可自定义iPad版我的标签页的服务内容。

  Storage: [储存] 配置类型
      ├ Argument: 优先使用来自 $argument 的配置，$argument 不包含的设置项由 PersistentStore (BoxJs) 提供
      ├ PersistentStore: 只使用 PersistentStore (BoxJs) 提供的配置
      └ database: 只使用由作者的 database.mjs 文件提供的默认配置，其他任何自定义配置不再起作用
  选择要使用的配置类型。未设置此选项或不通过此选项的旧版本的配置顺序依旧是 PersistentStore (BoxJs) > $argument > database。

  LogLevel: [调试] 日志等级
      ├ OFF: 关闭
      ├ ERROR: ❌ 错误
      ├ WARN: ⚠️ 警告
      ├ INFO: ℹ️ 信息
      ├ DEBUG: 🅱️ 调试
      └ ALL: 全部
  选择脚本日志的输出等级，低于所选等级的日志将全部输出。
open_url: http://boxjs.com/#/app/BiliBili.Enhanced
author: VirgilClyne[https://github.com/VirgilClyne]
homepage: https://Enhanced.BiliUniverse.io
icon: https://github.com/BiliUniverse/Enhanced/raw/main/src/assets/icon_rounded.png
dns: {}
scriptings:
- http_response:
    name: 📺 BiliBili.Enhanced.x.resource.show.tab.v2
    match: ^https?:\/\/app\.bili(bili\.com|api\.net)\/x\/resource\/show\/tab\/v2\?
    script_url: https://raw.githubusercontent.com/yrainy-0/dist/master/response.bundle.js
    env:
      _compat.$argument: Home.Switch="{{{Home.Switch}}}"&Home.Tab="{{{Home.Tab}}}"&Home.Tab_default="{{{Home.Tab_default}}}"&Home.Top_left="{{{Home.Top_left}}}"&Home.Top="{{{Home.Top}}}"&Bottom="{{{Bottom}}}"&Region.Switch="{{{Region.Switch}}}"&Mine.Switch="{{{Mine.Switch}}}"&Mine.iPad.Switch="{{{Mine.iPad.Switch}}}"&Storage="{{{Storage}}}"&LogLevel="{{{LogLevel}}}"
    body_required: true
- http_response:
    name: 📺 BiliBili.Enhanced.x.v2.account.mine
    match: ^https?:\/\/app\.bili(bili\.com|api\.net)\/x\/v2\/account\/mine(\/ipad)?\?
    script_url: https://raw.githubusercontent.com/yrainy-0/dist/master/response.bundle.js
    env:
      _compat.$argument: Home.Switch="{{{Home.Switch}}}"&Home.Tab="{{{Home.Tab}}}"&Home.Tab_default="{{{Home.Tab_default}}}"&Home.Top_left="{{{Home.Top_left}}}"&Home.Top="{{{Home.Top}}}"&Bottom="{{{Bottom}}}"&Region.Switch="{{{Region.Switch}}}"&Mine.Switch="{{{Mine.Switch}}}"&Mine.iPad.Switch="{{{Mine.iPad.Switch}}}"&Storage="{{{Storage}}}"&LogLevel="{{{LogLevel}}}"
    body_required: true
- http_response:
    name: 📺 BiliBili.Enhanced.x.v2.region.index
    match: ^https?:\/\/app\.bili(bili\.com|api\.net)\/x\/v2\/region\/index\?
    script_url: https://raw.githubusercontent.com/yrainy-0/dist/master/response.bundle.js
    env:
      _compat.$argument: Home.Switch="{{{Home.Switch}}}"&Home.Tab="{{{Home.Tab}}}"&Home.Tab_default="{{{Home.Tab_default}}}"&Home.Top_left="{{{Home.Top_left}}}"&Home.Top="{{{Home.Top}}}"&Bottom="{{{Bottom}}}"&Region.Switch="{{{Region.Switch}}}"&Mine.Switch="{{{Mine.Switch}}}"&Mine.iPad.Switch="{{{Mine.iPad.Switch}}}"&Storage="{{{Storage}}}"&LogLevel="{{{LogLevel}}}"
    body_required: true
- http_response:
    name: 📺 BiliBili.Enhanced.x.v2.channel.region.list
    match: ^https?:\/\/app\.bili(bili\.com|api\.net)\/x\/v2\/channel\/region\/list\?
    script_url: https://raw.githubusercontent.com/yrainy-0/dist/master/response.bundle.js
    env:
      _compat.$argument: Home.Switch="{{{Home.Switch}}}"&Home.Tab="{{{Home.Tab}}}"&Home.Tab_default="{{{Home.Tab_default}}}"&Home.Top_left="{{{Home.Top_left}}}"&Home.Top="{{{Home.Top}}}"&Bottom="{{{Bottom}}}"&Region.Switch="{{{Region.Switch}}}"&Mine.Switch="{{{Mine.Switch}}}"&Mine.iPad.Switch="{{{Mine.iPad.Switch}}}"&Storage="{{{Storage}}}"&LogLevel="{{{LogLevel}}}"
    body_required: true
- http_response:
    name: 📺 BiliBili.Enhanced.xlive.app.interface.v2.index.feed
    match: ^https?:\/\/api\.live\.bilibili\.com\/xlive\/app-interface\/v2\/index\/feed
    script_url: https://raw.githubusercontent.com/yrainy-0/dist/master/response.bundle.js
    env:
      _compat.$argument: Home.Switch="{{{Home.Switch}}}"&Home.Tab="{{{Home.Tab}}}"&Home.Tab_default="{{{Home.Tab_default}}}"&Home.Top_left="{{{Home.Top_left}}}"&Home.Top="{{{Home.Top}}}"&Bottom="{{{Bottom}}}"&Region.Switch="{{{Region.Switch}}}"&Mine.Switch="{{{Mine.Switch}}}"&Mine.iPad.Switch="{{{Mine.iPad.Switch}}}"&Storage="{{{Storage}}}"&LogLevel="{{{LogLevel}}}"
    body_required: true
mitm:
  hostnames:
    includes:
    - app.bilibili.com
    - app.biliapi.net
    - api.live.bilibili.com
